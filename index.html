<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM FITNESS EVERY DAY - TV Indoor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <header class="top-overlay">
        <div class="logo-area">
            <img src="assets/logo/logo.png" alt="Logo GYM FITNESS">

            <div class="logo-text">
                <strong>GYM FITNESS</strong>
                <span>EVERY DAY</span>
            </div>
        </div>

        <div class="clock-date-wrapper">
            <div class="date-box" id="date">Carregando...</div>
        </div>
    </header>

    <main class="center-container">

        <section class="ad-area" id="adArea">
            <div class="slide-dots" id="slideDots"></div>
        </section>

        <aside class="side-panel">

            <section class="panel-box" id="panelBox">
                <div class="status-line">
                    <div class="status-dot" id="statusDot"></div>
                    <div class="panel-title" id="funcTitulo">ABERTO AGORA</div>
                </div>

                <div class="info-label" id="infoLabel">HOJE</div>
                <div class="func-dia" id="diaSemana">---</div>
                <div class="func-horario" id="horarioHoje">--h às --h</div>

                <div class="count-label" id="countLabel">ENCERRA EM</div>
                <div class="countdown" id="contadorFechamento">--:--:--</div>

                <div class="mini-labels" id="miniLabels">
                    <span>HORAS</span>
                    <span>MIN</span>
                    <span>SEG</span>
                </div>

                <div class="gym-signature">
                    GYM FITNESS<br>
                    <span>EVERY DAY</span>
                </div>
            </section>

            <section class="painel-slide-box" id="painelArea"></section>

        </aside>

    </main>

    <footer class="bottom-overlay">
        <div class="ticker-label" id="tickerLabel">GYM INFORMA!</div>

        <div class="ticker-area">
            <div class="ticker-text" id="tickerText"></div>
        </div>
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
