<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" 
content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>GYM FITNESS EVERY DAY - TV Indoor</title>

<!-- ARQUIVO VISUAL -->
<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- BASE TV FULL HD -->
<div class="overlay">


    <!-- TOPO -->
    <header class="top-overlay">


        <!-- LOGO -->
        <div class="logo-area">

            <!-- MONIQUE AQUI!
            Trocar somente o arquivo:
            assets/logo/logo.png
            -->
            <img src="assets/logo/logo.png" alt="Logo">


            <div class="logo-text">

                <!-- MONIQUE AQUI!
                Nome da academia
                -->
                <strong>GYM FITNESS</strong>

                <span>EVERY DAY</span>

            </div>

        </div>



        <!-- DATA -->
        <div class="clock-date-wrapper">

            <div id="date" class="date-box">
                Carregando...
            </div>

        </div>


    </header>






    <!-- CONTEÚDO CENTRAL -->
    <main class="center-container">



        <!-- ANÚNCIOS PRINCIPAIS -->
        <section id="adArea" class="ad-area">


            <!-- indicadores -->
            <div id="slideDots" class="slide-dots"></div>


        </section>






        <!-- PAINEL DIREITO -->
        <aside class="side-panel">



            <!-- FUNCIONAMENTO -->
            <section id="panelBox" class="panel-box">


                <div class="status-line">

                    <div id="statusDot" 
                    class="status-dot"></div>


                    <div id="funcTitulo"
                    class="panel-title">

                    ABERTO AGORA

                    </div>

                </div>




                <div id="infoLabel"
                class="info-label">

                    HOJE

                </div>



                <div id="diaSemana"
                class="func-dia">

                    ---

                </div>



                <div id="horarioHoje"
                class="func-horario">

                    --h às --h

                </div>





                <div id="countLabel"
                class="count-label">

                    ENCERRA EM

                </div>



                <div id="contadorFechamento"
                class="countdown">

                    --:--:--

                </div>




                <div id="miniLabels"
                class="mini-labels">

                    <span>HORAS</span>
                    <span>MIN</span>
                    <span>SEG</span>

                </div>





                <!-- ASSINATURA -->
                <div class="gym-signature">


                    <!-- MONIQUE AQUI!
                    Nome no painel
                    -->

                    GYM FITNESS

                    <br>

                    <span>
                        EVERY DAY
                    </span>


                </div>



            </section>








            <!-- SLIDES LATERAIS -->
            <section 
            id="painelArea" 
            class="painel-slide-box">


            </section>




        </aside>



    </main>







    <!-- BARRA DE AVISOS -->
    <footer class="bottom-overlay">


        <div 
        id="tickerLabel" 
        class="ticker-label">


            GYM INFORMA


        </div>



        <div class="ticker-area">


            <div 
            id="tickerText"
            class="ticker-text">


            </div>


        </div>



    </footer>



</div>





<!-- SISTEMA -->
<script src="script.js"></script>



</body>


</html>
